apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  annotations:
    sonataflow.org/description: This workflow creates a pull request (GitHub) or merge request (GitLab) based on approvalTool parameter.
    sonataflow.org/expressionLang: jq
    sonataflow.org/profile: gitops
    sonataflow.org/version: "1.0"
  creationTimestamp: null
  labels:
    app: universal-pr
    app.kubernetes.io/component: serverless-workflow
    app.kubernetes.io/managed-by: sonataflow-operator
    app.kubernetes.io/name: universal-pr
    sonataflow.org/workflow-app: universal-pr
    sonataflow.org/workflow-namespace: ""
  name: universal-pr
spec:
  flow:
    dataInputSchema:
      failOnValidationErrors: true
      schema: schemas/create-pr-universal-input-schema.json
    functions:
      - name: scafolderMock
        operation: |
          {
            "files": [
              {
                "path": "README.md",
                "content": "# Hello World"
              },
              {
                "path": "index.js",
                "content": "console.log('Hello, world!');"
              }
            ]
          }
        type: expression
      - name: sysLog
        operation: sysout:INFO
        type: custom
      - name: getBranchSHA
        operation: specs/github.yaml#getBranchSHA
        type: rest
      - name: createCommit
        operation: specs/github.yaml#createCommit
        type: rest
      - name: createTree
        operation: specs/github.yaml#createTree
        type: rest
      - name: createBlob
        operation: specs/github.yaml#createBlob
        type: rest
      - name: createBranch
        operation: specs/github.yaml#createBranch
        type: rest
      - name: getCommitDetails
        operation: specs/github.yaml#getCommitDetails
        type: rest
      - name: createPullRequest
        operation: specs/github.yaml#createPullRequest
        type: rest
      - name: createNewBlob
        operation: '{"mode": "100644", "path": ($currentFile.path|tostring), "type": "blob", "sha": $WORKFLOW.prevActionResult.sha}'
        type: expression
      - name: githubSuccessResult
        operation: '{ "result": { "message": "PR created", "outputs":[ { "key": "PR_URL", "value": .prURL.html_url, "format":"link" } ] } }'
        type: expression
      - name: searchProjects
        operation: specs/gitlab.yaml#searchProjects
        type: rest
      - name: getProject
        operation: specs/gitlab.yaml#getProject
        type: rest
      - name: gitlabCreateBranch
        operation: specs/gitlab.yaml#createBranch
        type: rest
      - name: gitlabCreateCommit
        operation: specs/gitlab.yaml#createCommit
        type: rest
      - name: gitlabCreateMergeRequest
        operation: specs/gitlab.yaml#createMergeRequest
        type: rest
      - name: gitlabSuccessResult
        operation: '{ "result": { "message": "Merge Request created", "outputs":[ { "key": "MR_URL", "value": .mrURL.web_url, "format":"link" } ] } }'
        type: expression
    start:
      stateName: GetScafolderData
    states:
      - actionMode: sequential
        actions:
          - actionDataFilter:
              toStateData: .scafolderReponse
              useResults: true
            functionRef:
              invoke: sync
              refName: scafolderMock
            name: Get Scafolder data
        name: GetScafolderData
        transition:
          nextState: RouteToProvider
        type: operation
      - dataConditions:
          - condition: ${ .approvalTool == "GIT" }
            transition:
              nextState: GitHubCreateBranch
          - condition: ${ .approvalTool == "GITLAB" }
            transition:
              nextState: GitLabSearchProject
        defaultCondition:
          transition:
            nextState: ErrorUnknownProvider
        name: RouteToProvider
        type: switch
      - data:
          approvalTool: ${ .approvalTool }
          error: Unknown or unsupported approval tool
        end:
          terminate: true
        name: ErrorUnknownProvider
        type: inject
      - actionMode: sequential
        actions:
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                message: ${ "Creating GitHub branch for " + (.owner | tostring) + "/" + (.repo | tostring) }
              invoke: sync
              refName: sysLog
          - actionDataFilter:
              toStateData: .latestSHA
              useResults: true
            functionRef:
              arguments:
                owner: .owner
                ref: '"heads/" + .baseBranch'
                repo: .repo
              invoke: sync
              refName: getBranchSHA
            name: GetHeadSha
          - actionDataFilter:
              toStateData: .commit
              useResults: true
            functionRef:
              arguments:
                commit_sha: .latestSHA.object.sha
                owner: .owner
                repo: .repo
              invoke: sync
              refName: getCommitDetails
            name: getCommitDetails
        name: GitHubCreateBranch
        transition:
          nextState: GitHubCreateFiles
        type: operation
      - actions:
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                content: ($currentFile.content|tostring)
                encoding: utf-8
                owner: .owner
                repo: .repo
              invoke: sync
              refName: createBlob
            name: createBlob
          - actionDataFilter:
              useResults: true
            functionRef:
              invoke: sync
              refName: createNewBlob
            name: createNewBlob
        inputCollection: ${ [.scafolderReponse.files[]] }
        iterationParam: currentFile
        mode: parallel
        name: GitHubCreateFiles
        outputCollection: .blobs
        transition:
          nextState: GitHubCreateNewTree
        type: foreach
      - actionMode: sequential
        actions:
          - actionDataFilter:
              toStateData: .newTree
              useResults: true
            functionRef:
              arguments:
                base_tree: .commit.tree.sha
                owner: .owner
                repo: .repo
                tree: .blobs
              invoke: sync
              refName: createTree
            name: createTree
          - actionDataFilter:
              toStateData: .newCommit
              useResults: true
            functionRef:
              arguments:
                message: Added/Updated multiple files via API
                owner: .owner
                parents:
                  - .latestSHA.object.sha
                repo: .repo
                tree: .newTree.sha
              invoke: sync
              refName: createCommit
            name: createCommit
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                owner: .owner
                ref: '"refs/heads/" + .targetBranch'
                repo: .repo
                sha: .newCommit.sha
              invoke: sync
              refName: createBranch
            name: createBranch
        name: GitHubCreateNewTree
        transition:
          nextState: GitHubCreatePR
        type: operation
      - actionMode: sequential
        actions:
          - actionDataFilter:
              toStateData: .prURL
              useResults: true
            functionRef:
              arguments:
                base: .baseBranch
                body: ""
                head: .targetBranch
                owner: .owner
                repo: .repo
                title: Automated PR
              invoke: sync
              refName: createPullRequest
            name: createPullRequest
          - actionDataFilter:
              useResults: true
            functionRef:
              invoke: sync
              refName: githubSuccessResult
            name: setOutput
        end:
          terminate: true
        name: GitHubCreatePR
        type: operation
      - actionMode: sequential
        actions:
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                message: '${ "Searching GitLab project: " + (.owner | tostring) + "/" + (.repo | tostring) }'
              invoke: sync
              refName: sysLog
          - actionDataFilter:
              toStateData: .projectsList
              useResults: true
            functionRef:
              arguments:
                membership: true
                per_page: 100
                search: .repo
              invoke: sync
              refName: searchProjects
            name: SearchProjects
        name: GitLabSearchProject
        stateDataFilter:
          output: '${ . as $state | ($state.projectsList // []) | map(select(.path_with_namespace == ($state.owner + "/" + $state.repo)))[0] as $project | $state + {project: $project} }'
        transition:
          nextState: GitLabCreateBranch
        type: operation
      - actionMode: sequential
        actions:
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                message: '${ "Creating GitLab branch with project ID: " + (.project.id | tostring) }'
              invoke: sync
              refName: sysLog
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                branch: .targetBranch
                id: .project.id | tostring
                ref: .baseBranch
              invoke: sync
              refName: gitlabCreateBranch
            name: createBranch
        name: GitLabCreateBranch
        transition:
          nextState: GitLabCreateCommit
        type: operation
      - actionMode: sequential
        actions:
          - actionDataFilter:
              useResults: true
            functionRef:
              arguments:
                actions: '${ .scafolderReponse.files | map({ "action": "create", "file_path": .path, "content": .content }) }'
                branch: .targetBranch
                commit_message: Added/Updated multiple files via API
                id: .project.id | tostring
              invoke: sync
              refName: gitlabCreateCommit
            name: createCommit
        name: GitLabCreateCommit
        transition:
          nextState: GitLabCreateMR
        type: operation
      - actionMode: sequential
        actions:
          - actionDataFilter:
              toStateData: .mrURL
              useResults: true
            functionRef:
              arguments:
                id: .project.id | tostring
                source_branch: .targetBranch
                target_branch: .baseBranch
                title: Automated MR
              invoke: sync
              refName: gitlabCreateMergeRequest
            name: createMergeRequest
          - actionDataFilter:
              useResults: true
            functionRef:
              invoke: sync
              refName: gitlabSuccessResult
            name: setOutput
        end:
          terminate: true
        name: GitLabCreateMR
        type: operation
  podTemplate:
    container:
      image: quay.io/aandriienko/serverless-workflow-bulk-import-git-repos:de685fb03cf1427157000e206cce22b1dc08d25f
      resources: {}
      envFrom:
        - secretRef:
            name: gh-pr-secrets
  resources:
    configMaps:
      - configMap:
          name: 01-universal-pr-resources-schemas
        workflowPath: schemas
      - configMap:
          name: 02-universal-pr-resources-specs
        workflowPath: specs
  persistence:
    postgresql:
      secretRef:
        name: "backstage-psql-secret"
        userKey: "POSTGRES_USER"
        passwordKey: "POSTGRES_PASSWORD"
      serviceRef:
        name: "backstage-psql"
        port: 5432
        databaseName: "backstage_plugin_orchestrator"
        databaseSchema: bulk-import-git-repos
        namespace: "orchestrator"
status:
  address: {}
  lastTimeRecoverAttempt: null
