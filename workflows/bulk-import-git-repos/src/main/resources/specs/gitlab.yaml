openapi: 3.0.0
info:
  title: GitLab Repository Automation API
  version: 1.0.0
  description: API specification for automating GitLab repository tasks using the GitLab REST API v4.

servers:
  - url: https://gitlab.com/api/v4
    description: GitLab API
security:
- BearerToken: []
paths:
  /projects:
    get:
      summary: Search for projects
      operationId: searchProjects
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: membership
          in: query
          required: false
          schema:
            type: boolean
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Successfully retrieved projects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    path_with_namespace:
                      type: string
  /projects/{id}:
    get:
      summary: Get project details
      operationId: getProject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved project
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  path_with_namespace:
                    type: string
  /projects/{id}/repository/branches:
    post:
      summary: Create a new branch
      operationId: createBranch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                branch:
                  type: string
                ref:
                  type: string
      responses:
        '201':
          description: Branch created successfully
          content:
            application/json:
              schema:
                type: object
  /projects/{id}/repository/commits:
    post:
      summary: Create a new commit
      operationId: createCommit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                branch:
                  type: string
                commit_message:
                  type: string
                actions:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                      file_path:
                        type: string
                      content:
                        type: string
      responses:
        '201':
          description: Commit created successfully
          content:
            application/json:
              schema:
                type: object
  /projects/{id}/merge_requests:
    post:
      summary: Create a merge request
      operationId: createMergeRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_branch:
                  type: string
                target_branch:
                  type: string
                title:
                  type: string
      responses:
        '201':
          description: Merge request created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  web_url:
                    type: string
components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      description: Bearer Token authentication
