# This property is used to select the log level, which controls the amount
# of information logged on HTTP requests based on the severity of the events.
# Possible values: OFF, FATAL, ERROR, WARN, INFO, DEBUG, ALL.
# and see https://quarkus.io/guides/logging for documentation
quarkus.log.category."org.apache.http".level=INFO
quarkus.log.level=INFO


kie.flyway.enabled=false

%dev.quarkus.openapi-generator.github_yaml.auth.BearerToken.token-propagation=true
%dev.quarkus.openapi-generator.github_yaml.auth.BearerToken.header-name=X-Authorization-Github

%dev.quarkus.openapi-generator.githubtwo_yaml.auth.BearerToken.token-propagation=true
%dev.quarkus.openapi-generator.githubtwo_yaml.auth.BearerToken.header-name=X-Authorization-github-two

%dev.quarkus.openapi-generator.gitlab_yaml.auth.BearerToken.token-propagation=true
%dev.quarkus.openapi-generator.gitlab_yaml.auth.BearerToken.header-name=X-Authorization-gitlab
